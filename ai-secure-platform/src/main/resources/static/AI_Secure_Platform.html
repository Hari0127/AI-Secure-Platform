<!DOCTYPE html>
<html>
<head>
    <title>AI Secure Log Analyzer</title>
    <style>
        body {
            font-family: Arial;
            background: #0f172a;
            color: white;
            padding: 20px;
        }
        textarea {
            width: 100%;
            height: 150px;
            margin-bottom: 10px;
            padding: 10px;
        }
        button {
            padding: 10px 20px;
            background: #22c55e;
            border: none;
            color: white;
            cursor: pointer;
        }
        pre {
            background: #1e293b;
            padding: 15px;
            margin-top: 15px;
            overflow-x: auto;
        }
    </style>
</head>
<body>

<h2>🔐 AI Secure Log Analyzer</h2>

<textarea id="logInput" placeholder="Paste logs here..."></textarea>

<br>

<button onclick="analyze()">Analyze</button>

<pre id="result"></pre>

<script>
    function analyze() {
        const content = document.getElementById("logInput").value;

        fetch("/api/analyze", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                input_type: "log",
                content: content
            })
        })
        .then(res => res.json())
        .then(data => {
            document.getElementById("result").textContent =
                JSON.stringify(data, null, 2);
        })
        .catch(err => {
            document.getElementById("result").textContent = err;
        });
    }
</script>

</body>
</html>
